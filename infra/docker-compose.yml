services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartsupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartsupport}
      POSTGRES_DB: ${POSTGRES_DB:-smartsupport}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartsupport}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.15
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ../apps/backend
    env_file:
      - ../apps/backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - ../apps/backend:/app
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ../apps/frontend
    env_file:
      - ../apps/frontend/.env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
